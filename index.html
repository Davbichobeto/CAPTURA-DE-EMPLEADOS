<!DOCTYPE html>
<html lang="es">
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REGISTRO DE SERVICIO 2/o AGTO</title>
     <meta property="og:type" content="website">
    <style>
        body { background-color: black; color: white; font-family: Arial, sans-serif; display: flex; justify-content: center; padding: 20px; }
        .container { background-color: #333; padding: 20px; border-radius: 15px; border: 2px solid gold; width: 100%; max-width: 400px; }
        h2 { text-align: center; color: gold; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; margin-top: 5px; border-radius: 5px; border: none; box-sizing: border-box; }
        .buttons { margin-top: 20px; display: flex; justify-content: space-between; }
        button { padding: 10px 15px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; }
        #btnGuardar { background-color: gold; color: black; }
    </style>
</head>
<body>
    <div class="container">
        <h2>REGISTRO DE SERVICIO 2/o AGTO</h2>
        <form id="miFormulario">
            <label>Nombre</label> <input type="text" name="nombre" required>
            <label>Número de empl</label> <input type="number" name="numero_de_empl" required>
            <label>Grado</label>
<select name="grado" required>
    <option value="" disabled selected>Selecciona tu grado</option>
    <option>Policia</option>
    <option>Policia 2</option>
    <option>Policia 1</option>
    <option>Suboficial</option>
    <option>Oficial</option>
    <option>Subinspector</option>
    <option>Inspector</option>
    <option>Inspector General</option>
    <option>Comisario</option>
    <option>Comisario General</option>
</select>
            <label>Adscripción</label>
            <select name="adscripcion">
                <option>Rural Norte</option><option>Rural Noreste</option>
                <option>Rural Sur</option><option>Colombia</option>
                <option>Ares 3</option><option>Lampazos</option>
                <option>Dr. Coss</option><option>Cadereyta</option>
                <option>2/o Agto</option><option>Tácticos</option>
            </select>
            <label>Fecha</label> <input type="date" name="fecha" required>
            <div class="buttons">
                <button type="button" onclick="document.getElementById('miFormulario').reset()">Limpiar</button>
                <button type="button" id="btnGuardar" onclick="enviar()">Guardar</button>
            </div>
        </form>
    </div>

    <script>
        const url = "https://script.google.com/macros/s/AKfycbyDnoAMF1Oi5s7Hie_OjEyTpKe4iuipeqatAhVAXw97ZtHh2bZaG8oVh3c6uHEoiEe9hg/exec";

function enviar() {
    const btn = document.getElementById('btnGuardar');
    btn.disabled = true; // Deshabilita el botón para evitar doble clic
    btn.innerText = "Enviando...";

    let form = document.getElementById('miFormulario');
    let formData = new FormData(form);

    fetch(url, {
        method: 'POST',
        body: formData
    })
    .then(response => {
        alert('Datos guardados correctamente');
        form.reset(); // Limpia el formulario
        btn.disabled = false;
        btn.innerText = "Guardar";
    })
    .catch(error => {
        alert('Error al guardar: ' + error);
        btn.disabled = false;
        btn.innerText = "Guardar";
    });
}
    </script>
</body>
</html>
